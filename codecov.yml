# Coverage is informational for now: it reports on PRs but never fails them.
coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

comment:
  layout: "reach, diff, files"
  require_changes: true

# Both matrix jobs upload; wait for both before posting status.
codecov:
  notify:
    after_n_builds: 2
