name: Welcome

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: >
            Thanks for opening your first issue on Sifty! A maintainer will take
            a look soon. If this is a bug, the most helpful details are your
            Windows version, Python version, the exact command you ran, and the
            tail of `sifty logs`.
          pr-message: >
            Thanks for your first pull request to Sifty! A couple of things that
            help it land quickly: Sifty deletes files, so all deletion must go
            through `safety.trash()` and destructive paths default to dry-run.
            Please make sure `pytest` is green (especially `tests/test_safety.py`)
            and that the PR title starts with a type tag like `(feat)` or
            `(fix)`. See CONTRIBUTING.md for the full checklist. A maintainer
            will review shortly.
